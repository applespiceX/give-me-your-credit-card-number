<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Give Me Your Credit Card Number</title>
  <style>
    body { text-align: center; margin-top: 50px; font-family: sans-serif; }
    h1 { font-size: 4em; }
    h2 { font-size: 2em; margin-bottom: 30px; }
    button { font-size: 2em; padding: 0.5em 1em; margin-top: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>give me ur credit card number</h2>
  <h1 id="count">0</h1>
  <button id="increment">+1</button>

  <script>
    const countEl = document.getElementById('count');
    const btn = document.getElementById('increment');
    let cooldown = false;

    btn.addEventListener('click', () => {
      if (cooldown) return;        // ignore clicks during cooldown
      let current = parseInt(countEl.textContent);
      if (current < 99999999999) countEl.textContent = current + 1;

      cooldown = true;             // start cooldown
      btn.disabled = true;         // disable button
      setTimeout(() => {
        cooldown = false;
        btn.disabled = false;      // re-enable button after 1 second
      }, 1000);
    });
  </script>
</body>
</html>
